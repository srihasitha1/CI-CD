# ─────────────────────────────────────────────────────────────────────────────
# ML CI/CD Pipeline — Sprint 4 (Multi-Job)
# ─────────────────────────────────────────────────────────────────────────────
# Four isolated jobs with dependency gates:
#
#   test ──► train ──► evaluate ──► deploy
#
# • test:      Install deps, train a quick model, run pytest
# • train:     Full training with GridSearchCV, upload model artifacts
# • evaluate:  Download model, run evaluate.py (accuracy gate ≥ 0.82)
# • deploy:    Start Flask API, smoke-test all endpoints
#
# If evaluate fails (accuracy < 0.82), deploy is automatically skipped.
# ─────────────────────────────────────────────────────────────────────────────

name: ML CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# ═════════════════════════════════════════════════════════════════════════════
# JOB 1: TEST — run pytest suite
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create model directory
        run: mkdir -p model

      - name: Train model (for tests)
        run: python train.py

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 2: TRAIN — full training + upload artifacts
  # ═════════════════════════════════════════════════════════════════════════════
  train:
    name: "🏋️ Train"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create model directory
        run: mkdir -p model

      - name: Train model
        run: python train.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model/model.pkl
            model/model_previous.pkl
          retention-days: 7
          if-no-files-found: error

      - name: Training summary
        run: |
          echo "### 🏋️ Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "Model saved to \`model/model.pkl\`" >> $GITHUB_STEP_SUMMARY

  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 3: EVALUATE — accuracy gate with rollback
  # ═════════════════════════════════════════════════════════════════════════════
  evaluate:
    name: "📊 Evaluate"
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: model/

      - name: Verify model file
        run: |
          echo "📂 Model directory contents:"
          ls -lh model/

      - name: Evaluate model (accuracy gate ≥ 0.82)
        run: python evaluate.py
        # evaluate.py exits with code 1 if accuracy < 0.82,
        # triggering rollback and failing this job.
        # This prevents the deploy job from running.

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-metrics
          path: model/metrics.json
          retention-days: 7

      - name: Evaluation summary
        if: success()
        run: |
          echo "### 📊 Evaluation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat model/metrics.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 4: DEPLOY — smoke-test Flask API
  # ═════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy (Smoke Test)"
    runs-on: ubuntu-latest
    needs: evaluate
    # If evaluate fails, this job is automatically skipped by GitHub Actions.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: model/

      - name: Download metrics
        uses: actions/download-artifact@v4
        with:
          name: evaluation-metrics
          path: model/

      - name: Start Flask API (background)
        run: |
          python app.py &
          echo "APP_PID=$!" >> $GITHUB_ENV
          sleep 5

      # ── Smoke Test 1: /health ──────────────────────────────────────────────
      - name: "Smoke test: GET /health"
        run: |
          echo "── Testing GET /health ──"
          RESPONSE=$(curl --fail --silent --show-error http://localhost:5000/health)
          echo "$RESPONSE" | python -m json.tool
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', 'Health check failed'
          assert data['model_loaded'] == True, 'Model not loaded'
          print('✅ /health passed')
          "

      # ── Smoke Test 2: /metrics ─────────────────────────────────────────────
      - name: "Smoke test: GET /metrics"
        run: |
          echo "── Testing GET /metrics ──"
          RESPONSE=$(curl --fail --silent --show-error http://localhost:5000/metrics)
          echo "$RESPONSE" | python -m json.tool
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'accuracy' in data, 'Missing accuracy'
          assert 'timestamp' in data, 'Missing timestamp'
          print('✅ /metrics passed')
          "

      # ── Smoke Test 3: Valid prediction ─────────────────────────────────────
      - name: "Smoke test: POST /predict (valid)"
        run: |
          echo "── Testing POST /predict (valid 13 features) ──"
          RESPONSE=$(curl --fail --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"features": [14.23, 1.71, 2.43, 15.6, 127.0, 2.80, 3.06, 0.28, 2.29, 5.64, 1.04, 3.92, 1065.0]}' \
            http://localhost:5000/predict)
          echo "$RESPONSE" | python -m json.tool
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'prediction' in data, 'Missing prediction'
          assert data['prediction'] in [0, 1, 2], f'Invalid class: {data[\"prediction\"]}'
          assert 'probabilities' in data, 'Missing probabilities'
          print('✅ /predict (valid) passed')
          "

      # ── Smoke Test 4: Invalid prediction ───────────────────────────────────
      - name: "Smoke test: POST /predict (invalid)"
        run: |
          echo "── Testing POST /predict (invalid — wrong feature count) ──"
          HTTP_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"features": [1.0, 2.0]}' \
            http://localhost:5000/predict)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -eq 400 ]; then
            echo "✅ /predict (invalid) correctly returned 400"
          else
            echo "❌ Expected 400, got $HTTP_CODE"
            exit 1
          fi

      - name: Shut down Flask API
        if: always()
        run: kill $APP_PID 2>/dev/null || true

      # ── Pipeline Summary ───────────────────────────────────────────────────
      - name: Pipeline summary
        if: success()
        run: |
          echo "### ✅ ML CI/CD Pipeline — All Stages Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test     | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏋️ Train    | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Evaluate | ✅ Passed (≥ 82%) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy   | ✅ Smoke tests passed |" >> $GITHUB_STEP_SUMMARY
